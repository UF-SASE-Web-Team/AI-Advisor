name: Frontend CI (install & build)

on:
  push:
    branches:
      - main
      - master
      - 'sprint-*'
  pull_request:
    branches:
      - main
      - master
      - 'sprint-*'

jobs:
  install-and-build:
    name: Install (npm ci) and Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build --if-present
        working-directory: frontend

      - name: (optional) Run lint if available
        if: runner.os == 'Linux'
        run: |
          if npm run -s lint --workspace-root >/dev/null 2>&1; then
            npm run lint --silent
          else
            echo "No lint script defined; skipping"
          fi
        working-directory: frontend

