syntax = "proto3";

package rag;

option go_package = "github.com/UF-SASE-Web-Team/AI-Advisor/backend/services/api-gateway/proto/rag";

service RAGService {
  rpc Query(QueryRequest) returns (QueryResponse);

  rpc Health(HealthRequest) returns (HealthResponse);

  rpc GetCourseInfo(CourseInfoRequest) returns (CourseInfoResponse);

  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSessions(GetSessionsRequest) returns (GetSessionsResponse);
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
}

message QueryRequest {
  string question = 1;
  int32 max_results = 2;
  string session_id = 3;
  string user_id = 4;
}

message QueryResponse {
  string answer = 1;
  repeated SourceDocument sources = 2;
  string error_message = 3;
  string session_id = 4;
}

message SourceDocument {
  string course_code = 1;
  string course_name = 2;
  string content = 3;
  float relevance_score = 4;
}

message CourseInfoRequest {
  string course_code = 1;
}

message CourseInfoResponse {
  string course_code = 1;
  string course_name = 2;
  string description = 3;
  string prerequisites = 4;
  int32 credits = 5;
  string department = 6;
  repeated string instructors = 7;
  repeated MeetingTime meeting_times = 8;
  bool found = 9;
  string error_message = 10;
}

message MeetingTime {
  repeated string days = 1;
  string time_begin = 2;
  string time_end = 3;
  string building = 4;
  string room = 5;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

message CreateSessionRequest {
  string title = 1;
  string user_id = 2;
}

message CreateSessionResponse {
  string session_id = 1;
  string error_message = 2;
}

message GetSessionsRequest {
  string user_id = 1;
}

message GetSessionsResponse {
  repeated ChatSession sessions = 1;
  string error_message = 2;
}

message ChatSession {
  string session_id = 1;
  string title = 2;
  string created_at = 3;
  string updated_at = 4;
}

message GetMessagesRequest {
  string session_id = 1;
}

message GetMessagesResponse {
  repeated ChatMessage messages = 1;
  string error_message = 2;
}

message ChatMessage {
  string role = 1;
  string content = 2;
  string created_at = 3;
}
