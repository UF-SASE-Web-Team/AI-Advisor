services:
  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - PLANNER_GRPC_ADDR=planner:50051
      - RAG_GRPC_ADDR=rag:50052
    depends_on:
      - planner
      - rag
    env_file:
      - .env

  rag:
    build: ./services/rag
    container_name: rag
    ports:
      - "50052:50052"
    environment:
      - GRPC_PORT=50052
      - COURSE_DATA_PATH=/app/data/courses.json
    volumes:
      - ./data/courses.json:/app/data/courses.json:ro
    env_file:
      - .env

  planner:
    build: ./services/planner
    container_name: planner
    ports:
      - "50051:50051"
    environment:
      - GRPC_PORT=50051

  auth:
    build: ./services/auth
    container_name: auth
    ports:
      - "8083:8083"

volumes:
  rag-chroma-data:
